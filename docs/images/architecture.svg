<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Title -->
  <text x="400" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e3a8a">
    CertToCert Architecture
  </text>
  
  <!-- Client -->
  <rect x="50" y="150" width="180" height="100" rx="10" fill="#3b82f6" stroke="#1e3a8a" stroke-width="2"/>
  <text x="140" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Node.js Client</text>
  <text x="140" y="210" font-size="12" text-anchor="middle" fill="white">(client.js)</text>
  <text x="140" y="230" font-size="11" text-anchor="middle" fill="#dbeafe">Sends Events</text>
  
  <!-- Arrow from Client to Server -->
  <line x1="230" y1="200" x2="370" y2="200" stroke="#059669" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="300" y="190" font-size="11" text-anchor="middle" fill="#059669">mTLS</text>
  <text x="300" y="220" font-size="10" text-anchor="middle" fill="#6b7280">(Client Cert)</text>
  
  <!-- Server -->
  <rect x="370" y="150" width="180" height="100" rx="10" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="460" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="white">HTTPS Server</text>
  <text x="460" y="210" font-size="12" text-anchor="middle" fill="white">(server.js)</text>
  <text x="460" y="230" font-size="11" text-anchor="middle" fill="#e9d5ff">Port 8443</text>
  
  <!-- Arrow from Server to Browser -->
  <line x1="460" y1="250" x2="460" y2="310" stroke="#059669" stroke-width="3" marker-end="url(#arrowhead2)"/>
  <text x="480" y="280" font-size="11" text-anchor="start" fill="#059669">HTTPS</text>
  
  <!-- Browser -->
  <rect x="570" y="150" width="180" height="100" rx="10" fill="#ec4899" stroke="#be185d" stroke-width="2"/>
  <text x="660" y="190" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Web Dashboard</text>
  <text x="660" y="210" font-size="12" text-anchor="middle" fill="white">(Browser)</text>
  <text x="660" y="230" font-size="11" text-anchor="middle" fill="#fce7f3">Analytics UI</text>
  
  <!-- Arrow from Browser to Server -->
  <line x1="570" y1="200" x2="550" y2="200" stroke="#059669" stroke-width="2"/>
  <text x="560" y="190" font-size="10" text-anchor="middle" fill="#6b7280">API</text>
  
  <!-- CA -->
  <ellipse cx="400" cy="80" rx="90" ry="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#78350f">Certificate Authority</text>
  
  <!-- CA connections -->
  <line x1="340" y1="100" x2="140" y2="150" stroke="#d1d5db" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="400" y1="110" x2="460" y2="150" stroke="#d1d5db" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="460" y1="100" x2="660" y2="150" stroke="#d1d5db" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Legend -->
  <rect x="50" y="320" width="700" height="60" rx="5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="60" y="340" font-size="12" font-weight="bold" fill="#1f2937">Key Features:</text>
  <text x="60" y="360" font-size="11" fill="#374151">• Mutual TLS authentication ensures both client and server verify each other</text>
  <text x="60" y="375" font-size="11" fill="#374151">• All communications are encrypted and authenticated using certificates</text>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#059669"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="3" refY="9" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 6 0, 3 10" fill="#059669"/>
    </marker>
  </defs>
</svg>
