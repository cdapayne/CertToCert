<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <!-- Title -->
  <text x="350" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e3a8a">
    Certificate Setup Workflow
  </text>
  
  <!-- Step 1: Generate Certs -->
  <rect x="50" y="60" width="600" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="60" y="85" font-size="14" font-weight="bold" fill="#1e3a8a">Step 1: Generate Certificates</text>
  <text x="60" y="105" font-size="12" fill="#374151">$ bash scripts/generate-certs.sh</text>
  <text x="60" y="120" font-size="11" fill="#6b7280">Creates CA, server, and client certificates</text>
  
  <!-- Arrow -->
  <line x1="350" y1="130" x2="350" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow1)"/>
  
  <!-- Step 2: Start Server -->
  <rect x="50" y="160" width="600" height="70" rx="8" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="60" y="185" font-size="14" font-weight="bold" fill="#5b21b6">Step 2: Start Server</text>
  <text x="60" y="205" font-size="12" fill="#374151">$ npm start</text>
  <text x="60" y="220" font-size="11" fill="#6b7280">Server starts on https://localhost:8443 with mTLS enabled</text>
  
  <!-- Arrow -->
  <line x1="350" y1="230" x2="350" y2="260" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow1)"/>
  
  <!-- Step 3: Use Client -->
  <rect x="50" y="260" width="280" height="90" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="60" y="285" font-size="14" font-weight="bold" fill="#9f1239">Step 3a: Node.js Client</text>
  <text x="60" y="305" font-size="12" fill="#374151">$ npm run client</text>
  <text x="60" y="325" font-size="11" fill="#6b7280">Sends events programmatically</text>
  <text x="60" y="340" font-size="11" fill="#6b7280">✓ No browser setup needed</text>
  
  <!-- OR -->
  <ellipse cx="350" cy="305" rx="30" ry="25" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="310" font-size="13" font-weight="bold" text-anchor="middle" fill="#78350f">OR</text>
  
  <!-- Step 3: Browser -->
  <rect x="370" y="260" width="280" height="90" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="380" y="285" font-size="14" font-weight="bold" fill="#065f46">Step 3b: Web Browser</text>
  <text x="380" y="305" font-size="11" fill="#374151">1. Convert cert to PKCS#12</text>
  <text x="380" y="320" font-size="11" fill="#374151">2. Import to browser</text>
  <text x="380" y="335" font-size="11" fill="#374151">3. Navigate to https://localhost:8443</text>
  
  <!-- Arrow -->
  <line x1="190" y1="350" x2="190" y2="380" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="510" y1="350" x2="510" y2="380" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow1)"/>
  <line x1="190" y1="390" x2="350" y2="390" stroke="#6b7280" stroke-width="2"/>
  <line x1="510" y1="390" x2="350" y2="390" stroke="#6b7280" stroke-width="2"/>
  <line x1="350" y1="390" x2="350" y2="410" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow1)"/>
  
  <!-- Step 4: Analytics -->
  <rect x="50" y="410" width="600" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="60" y="435" font-size="14" font-weight="bold" fill="#166534">Step 4: View Analytics</text>
  <text x="60" y="455" font-size="12" fill="#374151">Events are displayed in the dashboard with various chart types</text>
  <text x="60" y="470" font-size="11" fill="#6b7280">✓ Real-time updates • ✓ Customizable cards • ✓ Drag-and-drop layout</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
